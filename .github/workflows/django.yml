name: Django CI

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: my_site.settings

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py migrate

    - name: Generate Pydoc
      run: |
        python manage.py shell -c "import pydoc; import blog.views; pydoc.writedoc(blog.views)"

    - name: Create docs folder
      run: |
        mkdir -p docs
        mv blog.views.html docs/

    - name: Upload docs
      uses: actions/upload-artifact@v4
      with:
        name: pydoc
        path: docs/