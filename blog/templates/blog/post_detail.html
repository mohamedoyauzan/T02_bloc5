{% extends "blog/base.html" %}

{% block title %}
{{ post.title }}
{% endblock %}

{% block content %}

<article class="post-detail">

    <div class="mb-5">

        <img
            src="{{ post.image_name }}"
            class="img-fluid rounded-4 shadow w-100 detail-image"
            alt="{{ post.title }}"
        >

    </div>

    <div class="text-center mb-5">

        <h1 class="display-4 fw-bold">
            {{ post.title }}
        </h1>

        <p class="text-muted mt-3">

            Publicat per
            <strong>
                {{ post.author.first_name }}
                {{ post.author.last_name }}
            </strong>

        </p>

    </div>

    <div class="mb-5">

        <p class="lead">

            {{ post.content }}

        </p>

    </div>

    <div class="mb-5">

        <h4 class="mb-3">
            Tags
        </h4>

        <div class="d-flex flex-wrap gap-2">

            {% for tag in post.tags.all %}

            <a
                href="{% url 'tag-posts-page' tag.id %}"
                class="btn btn-dark"
            >
                {{ tag.caption }}
            </a>

            {% endfor %}

        </div>

    </div>

</article>

{% endblock %}
