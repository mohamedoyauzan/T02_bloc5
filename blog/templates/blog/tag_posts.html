{% extends "blog/base.html" %}

{% block content %}

<h1 class="mb-5 text-center">
    Posts amb la tag "{{ tag.caption }}"
</h1>

<div class="row g-4">

{% for post in posts %}

<div class="col-md-4">

    <div class="card h-100 shadow-sm">

        <img
            src="{{ post.image_name }}"
            class="card-img-top"
        >

        <div class="card-body">

            <h4>
                {{ post.title }}
            </h4>

            <p>
                {{ post.excerpt }}
            </p>

            <a
                href="{% url 'post-detail-page' post.slug %}"
                class="btn btn-dark"
            >
                Llegir més
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
