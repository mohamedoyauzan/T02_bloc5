{% extends "blog/base.html" %}

{% block content %}

<h1 class="mb-5 text-center">
    Tags
</h1>

<div class="d-flex flex-wrap gap-3 justify-content-center">

{% for tag in tags %}

<a
    href="{% url 'tag-posts-page' tag.id %}"
    class="btn btn-dark btn-lg"
>
    {{ tag.caption }}
</a>

{% endfor %}

</div>

{% endblock %}
