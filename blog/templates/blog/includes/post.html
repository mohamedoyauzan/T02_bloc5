{% load static %}

<div class="post-card">

    <img
        src="{% static 'blog/images/'|add:post.image_name %}"
        alt="{{ post.title }}"
    >

    <div class="post-info">

        <h2>{{ post.title }}</h2>

        <p>{{ post.excerpt }}</p>

        <a href="/posts/{{ post.slug }}">
            Llegir més
        </a>

    </div>

</div>
